<?xml version="1.0" encoding="UTF-8"?>
<!--
  oxide-tech — The Ferric Core Mark
  
  A 6-tooth gear (Rust language) enclosing a hexagonal crystal lattice (SiO₂ / oxide)
  with a glowing central core (embedded processor). Symbolises the fusion of
  Rust engineering with silicon-level hardware mastery.
  
  Geometry:
    Gear ring:    r_valley = 30, r_tip = 44, 6 teeth at 0°/60°/120°/180°/240°/300°
    Inner hex:    r = 20, pointy-top orientation
    Lattice:      3 cross-lines connecting opposite hex vertices
    Core:         r = 8 (cyan) → r = 4 (cutout) → r = 2 (green center)
    Tooth nodes:  r = 1.5 at each tooth tip midpoint
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <title>oxide-tech Ferric Core Mark</title>
  <desc>Abstract geometric logo fusing a Rust gear with an oxide hexagonal lattice and embedded processor core.</desc>

  <!-- Background (optional, remove for transparent) -->
  <rect width="100" height="100" fill="#07070a" rx="8" />

  <!-- Outer Gear Ring — 6-tooth gear referencing Rust -->
  <polygon
    points="35,24 42.2,21 40.9,7 59.1,7 57.8,21 65,24 71.2,28.8 82.7,20.6 91.9,36.4 79,42.2 80,50 79,57.8 91.9,63.6 82.7,79.4 71.2,71.2 65,76 57.8,79 59.1,93 40.9,93 42.2,79 35,76 28.8,71.2 17.3,79.4 8.1,63.6 21,57.8 20,50 21,42.2 8.1,36.4 17.3,20.6 28.8,28.8"
    fill="none"
    stroke="#00d4ff"
    stroke-width="1.8"
    stroke-opacity="0.7"
    stroke-linejoin="round"
  />

  <!-- Inner Hexagon — SiO₂ crystal lattice -->
  <polygon
    points="50,30 67.3,40 67.3,60 50,70 32.7,60 32.7,40"
    fill="none"
    stroke="#00ff9f"
    stroke-width="1.5"
    stroke-opacity="0.8"
  />

  <!-- Lattice cross-lines (crystal structure) -->
  <line x1="50" y1="30" x2="50" y2="70" stroke="#00ff9f" stroke-width="0.8" stroke-opacity="0.3" />
  <line x1="67.3" y1="40" x2="32.7" y2="60" stroke="#00ff9f" stroke-width="0.8" stroke-opacity="0.3" />
  <line x1="67.3" y1="60" x2="32.7" y2="40" stroke="#00ff9f" stroke-width="0.8" stroke-opacity="0.3" />

  <!-- Gear tooth tip nodes (IC pin / connection nodes) -->
  <circle cx="50" cy="4.5" r="1.5" fill="#00d4ff" fill-opacity="0.6" />
  <circle cx="89.5" cy="27.3" r="1.5" fill="#00d4ff" fill-opacity="0.6" />
  <circle cx="89.5" cy="72.7" r="1.5" fill="#00d4ff" fill-opacity="0.6" />
  <circle cx="50" cy="95.5" r="1.5" fill="#00d4ff" fill-opacity="0.6" />
  <circle cx="10.5" cy="72.7" r="1.5" fill="#00d4ff" fill-opacity="0.6" />
  <circle cx="10.5" cy="27.3" r="1.5" fill="#00d4ff" fill-opacity="0.6" />

  <!-- Hexagon vertex nodes -->
  <circle cx="50" cy="30" r="1.2" fill="#00ff9f" fill-opacity="0.5" />
  <circle cx="67.3" cy="40" r="1.2" fill="#00ff9f" fill-opacity="0.5" />
  <circle cx="67.3" cy="60" r="1.2" fill="#00ff9f" fill-opacity="0.5" />
  <circle cx="50" cy="70" r="1.2" fill="#00ff9f" fill-opacity="0.5" />
  <circle cx="32.7" cy="60" r="1.2" fill="#00ff9f" fill-opacity="0.5" />
  <circle cx="32.7" cy="40" r="1.2" fill="#00ff9f" fill-opacity="0.5" />

  <!-- Central Core -->
  <circle cx="50" cy="50" r="8" fill="#00d4ff" fill-opacity="0.95" />
  <circle cx="50" cy="50" r="4" fill="#07070a" />
  <circle cx="50" cy="50" r="2" fill="#00ff9f" />
</svg>
